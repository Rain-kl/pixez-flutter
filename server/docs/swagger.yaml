basePath: /
definitions:
  model.APIResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  model.BanComment:
    properties:
      comment_id:
        type: string
      name:
        type: string
    type: object
  model.BanIllust:
    properties:
      illust_id:
        type: string
      name:
        type: string
    type: object
  model.BanTag:
    properties:
      name:
        type: string
      translate_name:
        type: string
    type: object
  model.BanUser:
    properties:
      name:
        type: string
      user_id:
        type: string
    type: object
  model.BasicErrorResponse:
    properties:
      error:
        type: string
    type: object
  model.ErrorResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  model.IllustHistory:
    properties:
      illust_id:
        type: integer
      picture_url:
        type: string
      time:
        type: integer
      title:
        type: string
      user_id:
        type: integer
      user_name:
        type: string
    type: object
  model.MessageResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  model.MirrorStatusResponse:
    properties:
      failed_count:
        type: integer
      illust_id:
        type: integer
      mirrored:
        type: boolean
      request_urls_json:
        type: string
      retry_urls_json:
        type: string
      status:
        type: string
      success_count:
        type: integer
      task_id:
        type: string
      total_count:
        type: integer
    type: object
  model.NovelHistory:
    properties:
      novel_id:
        type: integer
      picture_url:
        type: string
      time:
        type: integer
      title:
        type: string
      user_id:
        type: integer
      user_name:
        type: string
    type: object
  model.PingData:
    properties:
      status:
        type: string
    type: object
  model.PixivUser:
    properties:
      access_token:
        type: string
      account:
        type: string
      created_at:
        type: string
      device_token:
        type: string
      is_mail_authorized:
        type: integer
      is_premium:
        type: integer
      mail_address:
        type: string
      name:
        type: string
      pixiv_user_id:
        type: string
      refresh_token:
        type: string
      updated_at:
        type: string
      user_image:
        type: string
      x_restrict:
        type: integer
    type: object
  model.PixivUserSafeDTO:
    properties:
      account:
        type: string
      created_at:
        type: string
      is_mail_authorized:
        type: integer
      is_premium:
        type: integer
      mail_address:
        type: string
      name:
        type: string
      pixiv_user_id:
        type: string
      updated_at:
        type: string
      user_image:
        type: string
      x_restrict:
        type: integer
    type: object
  model.TagHistory:
    properties:
      name:
        type: string
      translated_name:
        type: string
      type:
        type: integer
    type: object
  model.UserDataHashes:
    additionalProperties:
      type: string
    type: object
  model.UserDataPayload:
    properties:
      ban_comments:
        items:
          $ref: '#/definitions/model.BanComment'
        type: array
      ban_illusts:
        items:
          $ref: '#/definitions/model.BanIllust'
        type: array
      ban_tags:
        items:
          $ref: '#/definitions/model.BanTag'
        type: array
      ban_users:
        items:
          $ref: '#/definitions/model.BanUser'
        type: array
      illust_histories:
        items:
          $ref: '#/definitions/model.IllustHistory'
        type: array
      novel_histories:
        items:
          $ref: '#/definitions/model.NovelHistory'
        type: array
      tag_histories:
        items:
          $ref: '#/definitions/model.TagHistory'
        type: array
    type: object
info:
  contact: {}
  description: PixEz Sync 后端同步服务 API。除 /mirror/** Pixiv 形态镜像接口外，系统 API 均返回 {success,message,data}
    标准响应。
  title: PixEz Sync Server API
  version: "1.0"
paths:
  /api/pixez/illusts/{illust_id}/mirror:
    get:
      description: Returns the latest mirror task status for a Pixiv illustration.
      parameters:
      - description: Pixiv illustration ID
        in: path
        name: illust_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.MirrorStatusResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Check illustration mirror status
      tags:
      - Mirror
    post:
      description: Enqueues an async task to mirror a Pixiv illustration detail response
        and its original images.
      parameters:
      - description: Pixiv illustration ID
        in: path
        name: illust_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.MirrorStatusResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Enqueue illustration mirror task
      tags:
      - Mirror
  /api/pixez/ping:
    get:
      description: Verifies that the server is reachable and Basic Auth credentials
        are valid.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.PingData'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Health check
      tags:
      - System
  /api/pixez/users:
    get:
      description: Retrieves all saved Pixiv users without sensitive token fields.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.PixivUserSafeDTO'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: List Pixiv users
      tags:
      - Users
  /api/pixez/users/{pixiv_user_id}:
    delete:
      description: Deletes a Pixiv user and all synced data associated with that user.
      parameters:
      - description: Pixiv user ID
        in: path
        name: pixiv_user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Delete Pixiv user
      tags:
      - Users
    get:
      description: Retrieves a Pixiv user's stored credentials, including access and
        refresh tokens.
      parameters:
      - description: Pixiv user ID
        in: path
        name: pixiv_user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.PixivUser'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Get Pixiv user credentials
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Inserts or updates a Pixiv user's stored credentials. The path
        Pixiv user ID is authoritative.
      parameters:
      - description: Pixiv user ID
        in: path
        name: pixiv_user_id
        required: true
        type: string
      - description: Pixiv user credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.PixivUser'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Upsert Pixiv user credentials
      tags:
      - Users
  /api/pixez/users/{pixiv_user_id}/sync-data:
    get:
      description: Fetches all or selected synced data tables for a Pixiv user.
      parameters:
      - description: Pixiv user ID
        in: path
        name: pixiv_user_id
        required: true
        type: string
      - description: Comma-separated table names, for example ban_comments,illust_histories
        in: query
        name: tables
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.UserDataPayload'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Get synced user data
      tags:
      - Sync Data
    post:
      consumes:
      - application/json
      description: Replaces the provided synced data tables for a Pixiv user in a
        single database transaction.
      parameters:
      - description: Pixiv user ID
        in: path
        name: pixiv_user_id
        required: true
        type: string
      - description: Synced user data payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/model.UserDataPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Replace synced user data
      tags:
      - Sync Data
  /api/pixez/users/{pixiv_user_id}/sync-data/hashes:
    get:
      description: Returns MD5 checksums for each synced table of a Pixiv user.
      parameters:
      - description: Pixiv user ID
        in: path
        name: pixiv_user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.UserDataHashes'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BasicAuth: []
      summary: Get synced data hashes
      tags:
      - Sync Data
  /mirror/v1/illust/detail:
    get:
      description: Reads a cached Pixiv /v1/illust/detail response and rewrites pximg
        URLs to this server's /mirror/pximg path. This endpoint intentionally returns
        the Pixiv response shape, not the standard PixEz Sync API envelope.
      parameters:
      - description: Pixiv illustration ID
        in: query
        name: illust_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.BasicErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.BasicErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.BasicErrorResponse'
      security:
      - BasicAuth: []
      summary: Get mirrored Pixiv illustration detail
      tags:
      - Pixiv Mirror
securityDefinitions:
  BasicAuth:
    type: basic
swagger: "2.0"
